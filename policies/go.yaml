ecosystem: go
default_allowed: false
max_cve_severity: HIGH

packages:
  # Web frameworks
  github.com/gin-gonic/gin:
    min_version: "1.9.0"
  github.com/labstack/echo/v4:
    min_version: "4.11.0"
  github.com/gofiber/fiber/v2:
    min_version: "2.50.0"
  github.com/gorilla/mux:
    min_version: "1.8.0"
    notes: "Archived - consider switching to chi or echo"

  # Database
  gorm.io/gorm:
    min_version: "1.25.0"
  gorm.io/driver/postgres:
    min_version: "1.5.0"
  github.com/jackc/pgx/v5:
    min_version: "5.4.0"
  github.com/go-sql-driver/mysql:
    min_version: "1.7.0"
  github.com/redis/go-redis/v9:
    min_version: "9.3.0"

  # Observability
  go.uber.org/zap:
    min_version: "1.26.0"
  github.com/rs/zerolog:
    min_version: "1.31.0"
  github.com/prometheus/client_golang:
    min_version: "1.17.0"
  go.opentelemetry.io/otel:
    min_version: "1.21.0"

  # gRPC / Protobuf
  google.golang.org/grpc:
    min_version: "1.58.0"
  google.golang.org/protobuf:
    min_version: "1.31.0"

  # CLI
  github.com/spf13/cobra:
    min_version: "1.7.0"
  github.com/spf13/viper:
    min_version: "1.17.0"
  github.com/urfave/cli/v2:
    min_version: "2.26.0"

  # Testing
  github.com/stretchr/testify:
    min_version: "1.8.0"

  # Auth / Security
  github.com/golang-jwt/jwt/v5:
    min_version: "5.2.0"
  golang.org/x/crypto:
    min_version: "0.17.0"
    notes: "Frequent CVEs - keep updated"

  # Utilities
  github.com/google/uuid:
    min_version: "1.4.0"
  golang.org/x/sync:
    min_version: "0.5.0"
