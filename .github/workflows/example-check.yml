name: Example Violation Check

on:
  push:
    branches:
      - "example/*"

jobs:
  validate:
    name: Progonitelj Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Progonitelj
        run: pip install -e .

      - name: Validate dependencies against policy
        run: progonitelj validate --strict
